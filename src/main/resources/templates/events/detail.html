<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8">
    <title th:text="${event.name}">Event</title>
  </head>
  <body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <h1 th:text="${event.name}">Event Name</h1>
    <p><b>Club's Name:</b> <span th:text="${club.name}">Club's name</span></p>
    <p><b>Date:</b> <span th:text="${event.date}">Event Date</span></p>
    <p><b>Location:</b> <span th:text="${event.location}">Event Location</span></p>
    <p><b>Type:</b> <span th:text="${event.type.name}">Event Type</span></p>
    <p><b>Description:</b> <span th:text="${event.description}">Event Description</span></p>

    <span><a th:href="@{/clubs/{clubId}/events/{id}/edit(clubId=${event.club.id}, id=${event.id})}" class="btn btn-primary">Edit</a></span>
    <span><a th:href="@{/clubs/{clubId}/events/{id}/delete(clubId=${event.club.id}, id=${event.id})}" class="btn btn-danger">Delete</a></span>

  </body>
</html>
