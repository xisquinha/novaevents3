<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Event</title>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<h2>Create Event</h2>

<form th:action="@{/clubs/{clubId}/events(clubId=${clubId})}"
      th:object="${eventForm}" method="post">

    <div th:if="${#fields.hasGlobalErrors()}">
        <p th:each="err : ${#fields.globalErrors()}" th:text="${err}" style="color:red;"></p>
    </div>

    <label for="name">Name</label>
    <input type="text" id="name" th:field="*{name}" required/>
    <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red;"></span>
    <br/>

    <label for="date">Date</label>
    <input type="date" id="date" th:field="*{date}"/>
    <span th:if="${#fields.hasErrors('date')}" th:errors="*{date}" style="color:red;"></span>
    <br/>

    <label for="type">Type</label>
    <select id="type" th:field="*{type}">
        <option th:each="t : ${eventTypes}"
                th:value="${t}" th:text="${t}"></option>
    </select>
    <span th:if="${#fields.hasErrors('type')}" th:errors="*{type}" style="color:red;"></span>
    <br/>

    <label for="location">Location</label>
    <input type="text" id="location" th:field="*{location}"/><br/>

    <label for="description">Description</label>
    <textarea id="description" th:field="*{description}"></textarea><br/>

    <button type="submit">Create Event</button>
    <a th:href="@{/clubs/{clubId}(clubId=${clubId})}">Cancel</a>

</form>
</body>
</html>
