<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8">
    <title th:text="${club.name}">Club</title>
  </head>
  <body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <h1 th:text="${club.name}">Club Name</h1>
    <p><span th:text="${club.category}">Club category</span></p>
    <p><span th:text="${club.description}">Club description</span></p>

    <a th:href = "@{/clubs/{clubId}/events(clubId=${club.id})}">View Events</a>
    <a th:href = "@{/clubs/{clubId}/events/new(clubId=${club.id})}">+ Add Event</a>

  </body>
</html>
